<body>
  <h2 id="score">score=0</h2>
  <img id="jeffy" src="https://static.tvtropes.org/pmwiki/pub/images/jeffy.png ">

<script>
  // click the <img> tag, score=score+1
  let score = 0
   document.getElementById("jeffy").addEventListener("click",scoreGoUp)
  document.getElementById("score").innerText=score
  function scoreGoUp() {
    score = score + 1
    //when you click,score go up,and you see it
     document.getElementById("score").innerText=score
}



  </script>
