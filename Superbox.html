<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <canvas id="canvas" height="800" width="900"></canvas>
  </body>
</html>
<script>
  let canvas = document.getElementById("canvas");
  let ctx = canvas.getContext("2d");
  let x = [];
  let y = [];
  let speedx = [];
  let speedY = [];
  for(var i=0; i< 1000; i=i+1){
    x.push(i)
    y.push(i)
   x.push(math.random()*50+50)
  }

  setInterval(move, 16);

  function move() {
    ctx.clearRect(0, 0, 2000, 2000);
    for (var i = 0; i < 10; i = i + 1) {
      x[i] = x[i] + speedx[i];
      y[i] = y[i] + speedY[i];
      if (y[i] > 500) {
        speedY[i] = -speedY[i];
      }
      if (y[i] < 0) {
        speedY[i] = -speedY[i];
      }
      if (x[i] > 600) {
        speedx[i] = -speedx[i];
      }
      if (x[i] < 0) {
        speedx[i] = -speedx[i];
      }
      ctx.fillRect(x[i], y[i], 20, 20);
    }
  }
</script>
